spring:
  application:
    name: painel-api
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: ${APP_OBSERVABILITY_SLOW_QUERY_MS:300}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  portal:
    frontend-base-url: ${APP_FRONTEND_BASE_URL}
    client-path: ${APP_PORTAL_CLIENT_PATH:/client-portal}
    default-ttl-minutes: ${APP_PORTAL_DEFAULT_TTL_MINUTES:1440}
    client-session-minutes: ${APP_PORTAL_CLIENT_SESSION_MINUTES:120}
  documents:
    download-token-minutes: ${APP_DOCUMENT_DOWNLOAD_TOKEN_MINUTES:5}
  storage:
    enabled: ${APP_STORAGE_ENABLED:false}
    endpoint: ${APP_STORAGE_ENDPOINT:}
    region: ${APP_STORAGE_REGION:}
    bucket: ${APP_STORAGE_BUCKET:}
    access-key: ${APP_STORAGE_ACCESS_KEY:}
    secret-key: ${APP_STORAGE_SECRET_KEY:}
    path-style: ${APP_STORAGE_PATH_STYLE:false}
    upload-url-minutes: ${APP_STORAGE_UPLOAD_URL_MINUTES:10}
    download-url-minutes: ${APP_STORAGE_DOWNLOAD_URL_MINUTES:5}
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
  observability:
    requests:
      enabled: ${APP_OBSERVABILITY_REQUESTS_ENABLED:true}
      warn-threshold-ms: ${APP_OBSERVABILITY_REQUEST_WARN_THRESHOLD_MS:750}
      include-health: ${APP_OBSERVABILITY_INCLUDE_HEALTH:false}
    database:
      slow-query-threshold-ms: ${APP_OBSERVABILITY_SLOW_QUERY_MS:300}

logging:
  level:
    org.hibernate.SQL_SLOW: WARN
