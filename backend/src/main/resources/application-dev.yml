spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/painel_cliente}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:607733%}
  jpa:
    show-sql: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  portal:
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
    client-path: ${APP_PORTAL_CLIENT_PATH:/client-portal}
    default-ttl-minutes: ${APP_PORTAL_DEFAULT_TTL_MINUTES:1440}
    client-session-minutes: ${APP_PORTAL_CLIENT_SESSION_MINUTES:120}
  documents:
    download-token-minutes: ${APP_DOCUMENT_DOWNLOAD_TOKEN_MINUTES:5}
  storage:
    enabled: ${APP_STORAGE_ENABLED:true}
    endpoint: ${APP_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${APP_STORAGE_REGION:us-east-1}
    bucket: ${APP_STORAGE_BUCKET:painel-docs}
    access-key: ${APP_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${APP_STORAGE_SECRET_KEY:minioadmin123}
    path-style: ${APP_STORAGE_PATH_STYLE:true}
    upload-url-minutes: ${APP_STORAGE_UPLOAD_URL_MINUTES:10}
    download-url-minutes: ${APP_STORAGE_DOWNLOAD_URL_MINUTES:5}
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-in-production-change-this-secret-in-production}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
  seed:
    admin-email: admin@painel.local
    admin-password: Admin@123
    admin-name: Administrador
